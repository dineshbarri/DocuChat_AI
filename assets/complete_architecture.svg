<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="0.48" stop-color="#0F233A"/>
      <stop offset="1" stop-color="#062E32"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE047"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12V2Z" fill="#67E8F9"/>
    </marker>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 60px; font-weight: 900; fill: #F8FAFC; letter-spacing: -1px; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #BBD0E6; }
      .section { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 25px; font-weight: 900; fill: #E0F2FE; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 850; fill: #F8FAFC; }
      .desc { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #C7D7EA; }
      .tiny { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 750; fill: #DBEAFE; }
      .num { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 900; fill: #02111E; }
      .line { stroke: #67E8F9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .dash { stroke: #FDE68A; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <circle cx="1460" cy="150" r="260" fill="#0EA5E9" opacity="0.14"/>
  <circle cx="230" cy="970" r="310" fill="#14B8A6" opacity="0.12"/>
  <path d="M0 890C300 800 480 930 730 835C980 740 1120 680 1410 740C1580 775 1710 745 1800 700V1100H0V890Z" fill="#0F766E" opacity="0.12"/>

  <text x="80" y="92" class="title">DocuChat_AI Complete Architecture</text>
  <text x="82" y="135" class="subtitle">Secure document upload, OCR extraction, RAG retrieval, AI intelligence, source-cited answers, and evaluation dashboard.</text>

  <g transform="translate(80 205)" filter="url(#shadow)">
    <rect width="350" height="170" rx="24" fill="#0E2035" stroke="#2A4C68" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="url(#cyan)"/><text x="36" y="49" class="num">1</text>
    <text x="76" y="51" class="label">Secure Access</text>
    <text x="32" y="96" class="desc">Optional APP_PASSWORD auth</text>
    <text x="32" y="124" class="desc">Public demo mode when unset</text>
    <text x="32" y="152" class="desc">Groq key through Secrets / .env</text>
  </g>

  <g transform="translate(505 205)" filter="url(#shadow)">
    <rect width="350" height="170" rx="24" fill="#0E2035" stroke="#2A4C68" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="url(#cyan)"/><text x="36" y="49" class="num">2</text>
    <text x="76" y="51" class="label">Document Intake</text>
    <text x="32" y="96" class="desc">PDF, DOCX, TXT uploads</text>
    <text x="32" y="124" class="desc">Temporary file processing</text>
    <text x="32" y="152" class="desc">No user document logging</text>
  </g>

  <g transform="translate(930 205)" filter="url(#shadow)">
    <rect width="350" height="170" rx="24" fill="#0E2035" stroke="#2A4C68" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="url(#cyan)"/><text x="36" y="49" class="num">3</text>
    <text x="76" y="51" class="label">Text + OCR</text>
    <text x="32" y="96" class="desc">PyPDF / DOCX loaders</text>
    <text x="32" y="124" class="desc">pypdfium2 + pytesseract</text>
    <text x="32" y="152" class="desc">Docker mode for Tesseract OCR</text>
  </g>

  <g transform="translate(1355 205)" filter="url(#shadow)">
    <rect width="350" height="170" rx="24" fill="#0E2035" stroke="#2A4C68" stroke-width="2"/>
    <circle cx="42" cy="42" r="20" fill="url(#cyan)"/><text x="36" y="49" class="num">4</text>
    <text x="76" y="51" class="label">Chunk + Embed</text>
    <text x="32" y="96" class="desc">Token-aware chunking</text>
    <text x="32" y="124" class="desc">Hugging Face MiniLM embeddings</text>
    <text x="32" y="152" class="desc">FAISS vector index</text>
  </g>

  <path class="line" d="M430 290H492"/>
  <path class="line" d="M855 290H917"/>
  <path class="line" d="M1280 290H1342"/>

  <g transform="translate(160 490)" filter="url(#shadow)">
    <rect width="420" height="210" rx="26" fill="#082F49" stroke="#38BDF8" stroke-width="2"/>
    <text x="34" y="52" class="section">RAG Question Answering</text>
    <text x="34" y="95" class="desc">History-aware retriever reformulates follow-up questions.</text>
    <text x="34" y="126" class="desc">MMR retrieval selects diverse relevant chunks.</text>
    <text x="34" y="157" class="desc">Groq LLM answers only from retrieved context.</text>
    <text x="34" y="188" class="desc">Source citations show file, page, and preview.</text>
  </g>

  <g transform="translate(690 490)" filter="url(#shadow)">
    <rect width="420" height="210" rx="26" fill="#0F2B28" stroke="#2DD4BF" stroke-width="2"/>
    <text x="34" y="52" class="section">AI Intelligence Layer</text>
    <text x="34" y="95" class="desc">Document classification: Research Paper, Contract, CV,</text>
    <text x="34" y="126" class="desc">Invoice, Policy, Report, or Other.</text>
    <text x="34" y="157" class="desc">NER: People, organizations, dates, money, locations.</text>
    <text x="34" y="188" class="desc">Risk detection: legal risks, missing info, deadlines.</text>
  </g>

  <g transform="translate(1220 490)" filter="url(#shadow)">
    <rect width="420" height="210" rx="26" fill="#2A1745" stroke="#C084FC" stroke-width="2"/>
    <text x="34" y="52" class="section">Evaluation Dashboard</text>
    <text x="34" y="95" class="desc">Upload labeled eval CSV with expected answers.</text>
    <text x="34" y="126" class="desc">Run test questions against the RAG pipeline.</text>
    <text x="34" y="157" class="desc">Score correctness, faithfulness, citation coverage.</text>
    <text x="34" y="188" class="desc">Export evaluation results as JSON.</text>
  </g>

  <path class="line" d="M1530 375C1530 430 1430 455 1430 480"/>
  <path class="line" d="M1530 375C1130 430 900 455 900 480"/>
  <path class="line" d="M1530 375C740 430 380 455 380 480"/>

  <g transform="translate(232 790)" filter="url(#shadow)">
    <rect width="300" height="135" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="28" y="48" class="label">Chat UI</text>
    <text x="28" y="83" class="desc">Summaries, extraction, analysis</text>
    <text x="28" y="111" class="desc">New Chat + export history</text>
  </g>

  <g transform="translate(585 790)" filter="url(#shadow)">
    <rect width="300" height="135" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="28" y="48" class="label">Intelligence Tab</text>
    <text x="28" y="83" class="desc">Entities, risks, action items</text>
    <text x="28" y="111" class="desc">Refresh intelligence status</text>
  </g>

  <g transform="translate(938 790)" filter="url(#shadow)">
    <rect width="300" height="135" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="28" y="48" class="label">RAG Quality</text>
    <text x="28" y="83" class="desc">Retrieved chunks, confidence</text>
    <text x="28" y="111" class="desc">Citation + context utilization</text>
  </g>

  <g transform="translate(1291 790)" filter="url(#shadow)">
    <rect width="300" height="135" rx="22" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="28" y="48" class="label">Privacy First</text>
    <text x="28" y="83" class="desc">No MongoDB logging by default</text>
    <text x="28" y="111" class="desc">Storage only as future opt-in</text>
  </g>

  <path class="dash" d="M370 700V779"/>
  <path class="dash" d="M900 700V779"/>
  <path class="dash" d="M1430 700V779"/>
  <path class="dash" d="M900 700C845 752 780 770 735 779"/>
  <path class="dash" d="M1430 700C1375 752 1345 770 1440 779"/>

  <text x="80" y="1020" class="tiny">Production path: Streamlit / Hugging Face Spaces, Docker for OCR, Groq Secrets, optional APP_PASSWORD, eval_sample.csv, DEPLOYMENT.md</text>
  <text x="1395" y="1020" class="tiny">Built by Dinesh Barri</text>
</svg>
