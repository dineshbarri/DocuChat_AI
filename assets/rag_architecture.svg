<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#10243A"/>
      <stop offset="1" stop-color="#062B31"/>
    </linearGradient>
    <linearGradient id="blueTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FACC15"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12V2Z" fill="#67E8F9"/>
    </marker>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 58px; font-weight: 800; fill: #F8FAFC; letter-spacing: -1px; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 23px; font-weight: 500; fill: #B6C6D8; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 25px; font-weight: 800; fill: #F8FAFC; }
      .desc { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #B8C7D9; }
      .small { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #D7E5F5; }
      .badge { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #031019; }
      .num { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 900; fill: #02111E; }
      .line { stroke: #67E8F9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .softLine { stroke: #FDE68A; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="110" r="230" fill="#0EA5E9" opacity="0.13" filter="url(#glow)"/>
  <circle cx="250" cy="770" r="260" fill="#14B8A6" opacity="0.11" filter="url(#glow)"/>
  <path d="M0 730C260 655 435 770 650 705C910 626 1030 520 1320 584C1460 615 1545 590 1600 558V900H0V730Z" fill="#0F766E" opacity="0.11"/>

  <text x="80" y="92" class="title">DocuChat_AI RAG Architecture</text>
  <text x="82" y="132" class="subtitle">From uploaded documents to grounded answers with citations, powered by LangChain, FAISS, Hugging Face embeddings, and Groq.</text>

  <g transform="translate(1235 64)">
    <rect width="280" height="58" rx="29" fill="#E0F2FE" opacity="0.96"/>
    <text x="31" y="37" class="badge">Document Intelligence</text>
  </g>

  <!-- Card 1 -->
  <g transform="translate(76 220)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#0F1F33" stroke="#25445F" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#blueTeal)"/>
    <text x="32" y="45" class="num">1</text>
    <text x="72" y="46" class="label">Upload Docs</text>
    <text x="30" y="91" class="desc">PDF, DOCX, TXT</text>
    <text x="30" y="122" class="desc">Multiple files supported</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(402 220)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#0F1F33" stroke="#25445F" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#blueTeal)"/>
    <text x="32" y="45" class="num">2</text>
    <text x="72" y="46" class="label">Extract Text</text>
    <text x="30" y="91" class="desc">Parse document content</text>
    <text x="30" y="122" class="desc">Clean readable text</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(728 220)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#0F1F33" stroke="#25445F" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#blueTeal)"/>
    <text x="32" y="45" class="num">3</text>
    <text x="72" y="46" class="label">Split Chunks</text>
    <text x="30" y="91" class="desc">Token-aware splitting</text>
    <text x="30" y="122" class="desc">Overlap preserves context</text>
  </g>

  <!-- Card 4 -->
  <g transform="translate(1054 220)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#0F1F33" stroke="#25445F" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#blueTeal)"/>
    <text x="32" y="45" class="num">4</text>
    <text x="72" y="46" class="label">Embeddings</text>
    <text x="30" y="91" class="desc">MiniLM vectors</text>
    <text x="30" y="122" class="desc">Semantic meaning captured</text>
  </g>

  <!-- Lower cards -->
  <g transform="translate(1054 520)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#082F49" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#amber)"/>
    <text x="32" y="45" class="num">5</text>
    <text x="72" y="46" class="label">FAISS Store</text>
    <text x="30" y="91" class="desc">Fast vector database</text>
    <text x="30" y="122" class="desc">Indexed knowledge base</text>
  </g>

  <g transform="translate(728 520)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#082F49" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#amber)"/>
    <text x="32" y="45" class="num">6</text>
    <text x="72" y="46" class="label">Retriever</text>
    <text x="30" y="91" class="desc">Finds relevant chunks</text>
    <text x="30" y="122" class="desc">MMR improves diversity</text>
  </g>

  <g transform="translate(402 520)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#082F49" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#amber)"/>
    <text x="32" y="45" class="num">7</text>
    <text x="72" y="46" class="label">Groq LLM</text>
    <text x="30" y="91" class="desc">Generates answer</text>
    <text x="30" y="122" class="desc">Uses retrieved context only</text>
  </g>

  <g transform="translate(76 520)" filter="url(#shadow)">
    <rect width="258" height="158" rx="24" fill="#082F49" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="38" cy="38" r="19" fill="url(#amber)"/>
    <text x="32" y="45" class="num">8</text>
    <text x="72" y="46" class="label">Final Output</text>
    <text x="30" y="91" class="desc">Grounded answer</text>
    <text x="30" y="122" class="desc">Source citations included</text>
  </g>

  <!-- Arrows top row -->
  <path class="line" d="M334 299H391"/>
  <path class="line" d="M660 299H717"/>
  <path class="line" d="M986 299H1043"/>
  <path class="line" d="M1183 379V509"/>
  <!-- Arrows bottom row -->
  <path class="line" d="M1054 599H997"/>
  <path class="line" d="M728 599H671"/>
  <path class="line" d="M402 599H345"/>

  <!-- Query path -->
  <g transform="translate(436 768)">
    <rect width="728" height="72" rx="36" fill="#071827" stroke="#2DD4BF" stroke-width="2"/>
    <text x="36" y="45" class="small">User question + chat history</text>
    <path class="softLine" d="M276 36H476"/>
    <text x="515" y="45" class="small">Context-aware retrieval</text>
  </g>
  <path class="softLine" d="M642 768C686 714 724 684 772 670"/>
  <path class="softLine" d="M1040 768C1002 714 958 684 910 670"/>

  <!-- Source citation rail -->
  <g transform="translate(1280 520)" filter="url(#shadow)">
    <rect width="238" height="158" rx="24" fill="#172554" stroke="#818CF8" stroke-width="2"/>
    <text x="30" y="48" class="label">Citations</text>
    <text x="30" y="89" class="desc">Document name</text>
    <text x="30" y="119" class="desc">Page / chunk preview</text>
  </g>
  <path class="line" d="M334 599C468 711 935 728 1270 599"/>

  <!-- Footer chips -->
  <g transform="translate(80 830)">
    <rect width="142" height="38" rx="19" fill="#DBEAFE"/>
    <text x="25" y="25" class="badge">LangChain</text>
  </g>
  <g transform="translate(238 830)">
    <rect width="100" height="38" rx="19" fill="#CCFBF1"/>
    <text x="29" y="25" class="badge">FAISS</text>
  </g>
  <g transform="translate(354 830)">
    <rect width="178" height="38" rx="19" fill="#FEF3C7"/>
    <text x="28" y="25" class="badge">Hugging Face</text>
  </g>
  <g transform="translate(548 830)">
    <rect width="92" height="38" rx="19" fill="#FFE4E6"/>
    <text x="27" y="25" class="badge">Groq</text>
  </g>
  <text x="1245" y="856" class="small">Built by Dinesh Barri</text>
</svg>
